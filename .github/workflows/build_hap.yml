name: Build OpenHarmony HAP

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-hap:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Java 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Cache HarmonyOS SDK
        id: cache-sdk
        uses: actions/cache@v4
        with:
          path: ~/ohos-sdk
          key: ohos-sdk-5.0.0

      - name: Download HarmonyOS SDK
        if: steps.cache-sdk.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/ohos-sdk
          cd ~/ohos-sdk
          wget -q https://repo.huaweicloud.com/harmonyos/os/5.0.0-Release/ohos-sdk-windows_linux-public.tar.gz
          tar -xzf ohos-sdk-windows_linux-public.tar.gz
          rm -f ohos-sdk-windows_linux-public.tar.gz

      - name: Debug SDK structure
        run: |
          echo "=== SDK directory structure ==="
          ls -la ~/ohos-sdk/
          echo "---"
          find ~/ohos-sdk -maxdepth 3 -type d | head -50

      - name: Setup HarmonyOS SDK environment
        run: |
          # 查找 SDK 实际路径
          SDK_PATH=$(find ~/ohos-sdk -maxdepth 2 -name "ohos-sdk" -type d 2>/dev/null | head -1)
          if [ -z "$SDK_PATH" ]; then
            SDK_PATH="$HOME/ohos-sdk"
          fi
          echo "HOS_SDK_HOME=$SDK_PATH" >> $GITHUB_ENV
          echo "OHOS_BASE_SDK_HOME=$SDK_PATH" >> $GITHUB_ENV

      - name: Setup Flutter SDK (OpenHarmony)
        run: |
          git clone --branch 3.35.8-ohos-1.0.3-beta --depth 1 https://gitcode.com/CPF-Flutter/flutter_flutter.git
          echo "$(pwd)/flutter_flutter/bin" >> $GITHUB_PATH

      - name: Verify Flutter version
        run: |
          flutter --version
          echo "---"
          echo "HOS_SDK_HOME=$HOS_SDK_HOME"
          ls -la $HOS_SDK_HOME 2>/dev/null || echo "SDK dir not found"

      - name: Install dependencies
        working-directory: app
        run: flutter pub get

      - name: Build HAP (Release)
        working-directory: app
        run: flutter build hap --release

      - name: Find HAP file
        id: find-hap
        run: |
          HAP_PATH=$(find app/build -name "*.hap" -type f 2>/dev/null | head -1)
          if [ -n "$HAP_PATH" ]; then
            echo "hap_path=$HAP_PATH" >> $GITHUB_OUTPUT
            echo "HAP found: $HAP_PATH"
            ls -lh "$HAP_PATH"
          else
            echo "No HAP file found!"
            exit 1
          fi

      - name: Upload HAP as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: localsend-hap
          path: ${{ steps.find-hap.outputs.hap_path }}

      - name: Create GitHub Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.find-hap.outputs.hap_path }}
