name: Build OpenHarmony HAP

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-hap:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Java 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Setup OpenHarmony SDK
        id: setup-ohos-sdk
        uses: openharmony-rs/setup-ohos-sdk@v1.0.0
        with:
          version: '5.0.0'
          cache: true
          components: 'all'

      - name: Setup OpenHarmony SDK environment
        run: |
          # 设置 SDK 环境变量
          echo "OHOS_SDK_HOME=${{ steps.setup-ohos-sdk.outputs.ohos_sdk_native }}" >> $GITHUB_ENV
          echo "OHOS_BASE_SDK_HOME=${{ steps.setup-ohos-sdk.outputs.ohos_sdk_native }}" >> $GITHUB_ENV
          echo "HOS_SDK_HOME=${{ steps.setup-ohos-sdk.outputs.ohos_sdk_native }}" >> $GITHUB_ENV

      - name: Setup Flutter SDK (OpenHarmony)
        run: |
          git clone --branch 3.35.8-ohos-1.0.3-beta --depth 1 https://gitcode.com/CPF-Flutter/flutter_flutter.git
          echo "$(pwd)/flutter_flutter/bin" >> $GITHUB_PATH

      - name: Verify environment
        run: |
          flutter --version
          echo "---"
          echo "OHOS_SDK_HOME=$OHOS_SDK_HOME"
          echo "HOS_SDK_HOME=$HOS_SDK_HOME"
          echo "---"
          echo "=== Check hdc ==="
          which hdc 2>/dev/null && hdc --version 2>/dev/null || echo "hdc not in PATH"
          echo "=== Check cmake ==="
          which cmake 2>/dev/null && cmake --version 2>/dev/null | head -1 || echo "cmake not in PATH"
          echo "=== Check clang ==="
          which clang 2>/dev/null && clang --version 2>/dev/null | head -1 || echo "clang not in PATH"

      - name: Install dependencies
        working-directory: app
        run: flutter pub get

      - name: Build HAP (Release)
        working-directory: app
        run: flutter build hap --release

      - name: Find HAP file
        id: find-hap
        run: |
          HAP_PATH=$(find app/build -name "*.hap" -type f 2>/dev/null | head -1)
          if [ -n "$HAP_PATH" ]; then
            echo "hap_path=$HAP_PATH" >> $GITHUB_OUTPUT
            echo "HAP found: $HAP_PATH"
            ls -lh "$HAP_PATH"
          else
            echo "No HAP file found!"
            exit 1
          fi

      - name: Upload HAP as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: localsend-hap
          path: ${{ steps.find-hap.outputs.hap_path }}

      - name: Create GitHub Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.find-hap.outputs.hap_path }}
