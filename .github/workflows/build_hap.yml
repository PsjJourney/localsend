name: Build OpenHarmony HAP

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-hap:
    runs-on: ubuntu-latest
    container: ghcr.io/niuhuan/harmony-next-flutter-pipeline-docker/image:latest
    timeout-minutes: 120

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Verify environment
        run: |
          echo "=== Flutter version ==="
          flutter --version
          echo "---"
          echo "=== OHOS_BASE_SDK_HOME ==="
          echo "OHOS_BASE_SDK_HOME=$OHOS_BASE_SDK_HOME"
          echo "=== HDC ==="
          which hdc 2>/dev/null && hdc --version 2>/dev/null || echo "hdc not in PATH"

      - name: Resolve OHOS native SDK
        run: |
          NATIVE_DIR="${OHOS_SDK_NATIVE_DIR:-}"

          if [ -z "$NATIVE_DIR" ]; then
            for ROOT in "${OHOS_BASE_SDK_HOME:-}" "${OHOS_SDK_HOME:-}"; do
              if [ -z "$ROOT" ] || [ ! -d "$ROOT" ]; then
                continue
              fi
              if [ -x "$ROOT/llvm/bin/clang" ] && [ -d "$ROOT/sysroot" ]; then
                NATIVE_DIR="$ROOT"
                break
              fi
              CANDIDATE=$(find "$ROOT" -path '*/native/llvm/bin/clang' -type f | head -1 || true)
              if [ -n "$CANDIDATE" ]; then
                NATIVE_DIR=$(dirname "$(dirname "$(dirname "$CANDIDATE")")")
                break
              fi
            done
          fi

          if [ -z "$NATIVE_DIR" ]; then
            echo "Unable to locate OpenHarmony native SDK directory."
            exit 1
          fi

          echo "Resolved OHOS_SDK_NATIVE_DIR=$NATIVE_DIR"
          echo "OHOS_SDK_NATIVE_DIR=$NATIVE_DIR" >> "$GITHUB_ENV"

      - name: Install Rust toolchain
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          . "$HOME/.cargo/env"
          rustup target add aarch64-unknown-linux-ohos
          rustup show
          cargo --version

      - name: Install dependencies
        working-directory: app
        run: |
          . "$HOME/.cargo/env"
          flutter pub get
          dart run tool/fix_ohos_plugin_hvigor.dart

      - name: Build HAP (Release)
        working-directory: app
        run: |
          . "$HOME/.cargo/env"
          flutter build hap --release --target-platform=ohos-arm64

      - name: Find HAP file
        id: find-hap
        run: |
          HAP_PATH=$(find app -name "*.hap" -type f 2>/dev/null | head -1)
          if [ -z "$HAP_PATH" ]; then
            HAP_PATH=$(find . -name "*-signed.hap" -type f 2>/dev/null | head -1)
          fi
          if [ -n "$HAP_PATH" ]; then
            echo "hap_path=$HAP_PATH" >> $GITHUB_OUTPUT
            echo "HAP found: $HAP_PATH"
            ls -lh "$HAP_PATH"
          else
            echo "No HAP file found!"
            exit 1
          fi

      - name: Upload HAP as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: localsend-hap
          path: ${{ steps.find-hap.outputs.hap_path }}

      - name: Create GitHub Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.find-hap.outputs.hap_path }}
