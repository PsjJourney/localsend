name: Build OpenHarmony HAP

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  FLUTTER_VERSION: "3.38.10"

jobs:
  build-hap:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Setup Flutter SDK (OpenHarmony)
        uses: flutter-actions/setup-flutter@v4
        with:
          version: ${{ env.FLUTTER_VERSION }}
          channel: "stable"

      - name: Add OpenHarmony Flutter support
        run: |
          git clone https://gitee.com/openharmony-sig/flutter_ohos.git --depth 1
          cd flutter_ohos
          ./flutter/tools/gn --ohos --unoptimized
          ./flutter/tools/ninja -C out/ohos_unopt

      - name: Add Flutter to PATH
        run: |
          echo "$(pwd)/flutter_ohos/flutter/bin" >> $GITHUB_PATH

      - name: Install dependencies
        working-directory: app
        run: flutter pub get

      - name: Build HAP (Release)
        working-directory: app
        run: flutter build hap --release

      - name: Find HAP file
        id: find-hap
        run: |
          HAP_PATH=$(find app/build -name "*.hap" -type f 2>/dev/null | head -1)
          if [ -n "$HAP_PATH" ]; then
            echo "hap_path=$HAP_PATH" >> $GITHUB_OUTPUT
            echo "HAP found: $HAP_PATH"
            ls -lh "$HAP_PATH"
          else
            echo "No HAP file found!"
            exit 1
          fi

      - name: Upload HAP as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: localsend-hap
          path: ${{ steps.find-hap.outputs.hap_path }}

      - name: Create GitHub Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.find-hap.outputs.hap_path }}
