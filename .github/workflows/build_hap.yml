name: Build OpenHarmony HAP

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-hap:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Java 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Cache OpenHarmony SDK
        id: cache-sdk
        uses: actions/cache@v4
        with:
          path: ~/harmonyos-sdk
          key: ohos-sdk-5.0.0-Release-v1

      - name: Download and setup OpenHarmony SDK
        if: steps.cache-sdk.outputs.cache-hit != 'true'
        run: |
          # 按照官方脚本重构
          mkdir -p ~/harmonyos-sdk
          cd ~/harmonyos-sdk

          # 下载 SDK 压缩包
          echo "=== Downloading SDK ==="
          wget -q https://repo.huaweicloud.com/harmonyos/os/5.0.0-Release/ohos-sdk-windows_linux-public.tar.gz

          # 解压主压缩包
          echo "=== Extracting main archive ==="
          tar -xzf ohos-sdk-windows_linux-public.tar.gz
          rm -f ohos-sdk-windows_linux-public.tar.gz

          # 进入 linux 目录解压各组件
          cd linux
          echo "=== Extracting native ==="
          unzip -q *native-linux-*.zip -d ./native
          echo "=== Extracting toolchains ==="
          unzip -q *toolchains-linux-*.zip -d ./toolchains

          # 清理 zip 文件
          rm -f *.zip

      - name: Verify SDK structure
        run: |
          echo "=== SDK root ==="
          ls -la ~/harmonyos-sdk/
          echo "=== Linux directory ==="
          ls -la ~/harmonyos-sdk/linux/ 2>/dev/null || echo "linux/ not found"
          echo "=== Check native ==="
          ls -la ~/harmonyos-sdk/linux/native/ 2>/dev/null || echo "native/ not found"
          echo "=== Check toolchains ==="
          ls -la ~/harmonyos-sdk/linux/toolchains/ 2>/dev/null || echo "toolchains/ not found"
          echo "=== Check hdc ==="
          ls -la ~/harmonyos-sdk/linux/toolchains/hdc 2>/dev/null || echo "hdc not found"
          echo "=== Find hdc ==="
          find ~/harmonyos-sdk -name "hdc" -type f 2>/dev/null

      - name: Setup OpenHarmony SDK environment
        run: |
          # 设置 SDK 根目录
          echo "OHOS_SDK_HOME=$HOME/harmonyos-sdk/linux" >> $GITHUB_ENV
          echo "OHOS_BASE_SDK_HOME=$HOME/harmonyos-sdk/linux" >> $GITHUB_ENV
          echo "HOS_SDK_HOME=$HOME/harmonyos-sdk/linux" >> $GITHUB_ENV
          # 添加 hdc 调试工具
          echo "$HOME/harmonyos-sdk/linux/toolchains" >> $GITHUB_PATH
          # 添加 Native 编译器 (clang, cmake等)
          echo "$HOME/harmonyos-sdk/linux/native/build-tools/cmake/bin" >> $GITHUB_PATH
          echo "$HOME/harmonyos-sdk/linux/native/llvm/bin" >> $GITHUB_PATH

      - name: Setup Flutter SDK (OpenHarmony)
        run: |
          git clone --branch 3.35.8-ohos-1.0.3-beta --depth 1 https://gitcode.com/CPF-Flutter/flutter_flutter.git
          echo "$(pwd)/flutter_flutter/bin" >> $GITHUB_PATH

      - name: Verify environment
        run: |
          flutter --version
          echo "---"
          echo "OHOS_SDK_HOME=$OHOS_SDK_HOME"
          echo "HOS_SDK_HOME=$HOS_SDK_HOME"
          echo "---"
          echo "=== Check hdc ==="
          which hdc 2>/dev/null && hdc --version 2>/dev/null || echo "hdc not in PATH"
          echo "=== Check cmake ==="
          which cmake 2>/dev/null && cmake --version 2>/dev/null | head -1 || echo "cmake not in PATH"
          echo "=== Check clang ==="
          which clang 2>/dev/null && clang --version 2>/dev/null | head -1 || echo "clang not in PATH"

      - name: Install dependencies
        working-directory: app
        run: flutter pub get

      - name: Build HAP (Release)
        working-directory: app
        run: flutter build hap --release

      - name: Find HAP file
        id: find-hap
        run: |
          HAP_PATH=$(find app/build -name "*.hap" -type f 2>/dev/null | head -1)
          if [ -n "$HAP_PATH" ]; then
            echo "hap_path=$HAP_PATH" >> $GITHUB_OUTPUT
            echo "HAP found: $HAP_PATH"
            ls -lh "$HAP_PATH"
          else
            echo "No HAP file found!"
            exit 1
          fi

      - name: Upload HAP as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: localsend-hap
          path: ${{ steps.find-hap.outputs.hap_path }}

      - name: Create GitHub Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.find-hap.outputs.hap_path }}
